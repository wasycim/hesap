services:
  postgres:
    image: postgres:16-alpine
    container_name: hesap-mesai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hesap_mesai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hesap_mesai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
