<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Hesap</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(360px, calc(100vw - 40px));
        text-align: center;
      }
      img {
        width: 84px;
        height: 84px;
        border-radius: 22px;
        object-fit: cover;
      }
      h1 { margin: 18px 0 8px; font-size: 24px; }
      p { margin: 0; color: #cbd5e1; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main>
      <img src="./icon.png" alt="Hesap" />
      <h1>Hesap</h1>
      <p>Uygulama aciliyor. Internet baglantinizi kontrol edin.</p>
    </main>
  </body>
</html>
