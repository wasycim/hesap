<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Hesap</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(16, 185, 129, .22), transparent 32rem),
          linear-gradient(145deg, #020617, #0f172a 58%, #111827);
        color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(380px, calc(100vw - 40px));
        border: 1px solid rgba(148, 163, 184, .22);
        border-radius: 28px;
        background: rgba(15, 23, 42, .82);
        padding: 28px;
        text-align: center;
        box-shadow: 0 24px 80px rgba(0, 0, 0, .32);
      }
      img {
        width: 88px;
        height: 88px;
        border-radius: 24px;
        object-fit: cover;
      }
      h1 { margin: 20px 0 8px; font-size: 26px; line-height: 1.1; }
      p { margin: 0; color: #cbd5e1; line-height: 1.55; }
      button {
        margin-top: 22px;
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 14px;
        background: #10b981;
        color: white;
        font: inherit;
        font-weight: 800;
      }
      small {
        display: block;
        margin-top: 14px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="./icon.png" alt="Hesap" />
      <h1>Internet baglantisi yok</h1>
      <p>Uygulama acilmak icin baglanti bekliyor. Internet geldikten sonra tekrar yukle.</p>
      <button type="button" onclick="location.reload()">Yeniden yukle</button>
      <small>Uygulama icinde kaydedilen islemler baglanti gelince senkronize edilir.</small>
    </main>
    <script>
      const appUrl = "https://pamukkaleturizm.info"
      function openAppWhenOnline() {
        if (navigator.onLine) window.location.replace(appUrl)
      }
      window.addEventListener("online", openAppWhenOnline)
      window.setTimeout(openAppWhenOnline, 250)
    </script>
  </body>
</html>
